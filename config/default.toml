[schedule]
# Hora de inicio del bloqueo (0-23, formato 24h)
start = 9
# Hora de fin del bloqueo (0-23, formato 24h)
end = 18
# Bloquear también sábado y domingo
block_weekends = false

[sites]
# Lista de dominios a bloquear
list = [
  "tiktok.com",
  "m.tiktok.com",
  "vm.tiktok.com",
  "api.tiktok.com",
  "api2.musical.ly",
  "musical.ly",
  "instagram.com",
  "i.instagram.com",
  "l.instagram.com",
  "graph.instagram.com",
  "cdninstagram.com",
  "pornhub.com",
  "es.pornhub.com",
  "xvideos.com",
  "xnxx.com",
  "xhamster.com",
  "redtube.com",
  "youporn.com",
  "tube8.com",
  "spankbang.com",
  # youtube.com se expande en tiempo de ejecución a aliases comunes
  # como www.youtube.com, m.youtube.com, music.youtube.com y youtu.be
  "youtube.com"
]

[hosts]
# Ruta del archivo /etc/hosts
file = "/etc/hosts"
# Marcador para identificar el bloque de PARAMO
marker = "# --- PARAMO BLOCK ---"
# IPs a las que redirigir
redirect_ips = ["127.0.0.1", "::1"]

[logging]
# Ruta del archivo de log
file = "/var/log/paramo.log"
# Nivel de logging: debug, info, warn, error
level = "info"

[daemon]
# Intervalo del daemon en segundos
interval_seconds = 1200
