name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  # Validacion manual de la formula (no corre en tags: eso lo hace release.yml)
  homebrew:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install formula from local source
        run: brew install --build-from-source ./Formula/paramo.rb
      - name: Smoke test installed binary
        run: |
          paramo config show | grep '\[schedule\]'
          brew uninstall paramo
